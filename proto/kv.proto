syntax = "proto3";

package kv;

option go_package = "github.com/adam/d-key-value-store/internal/server/kvpb";

service KV {
  rpc Put(PutRequest) returns (PutResponse);
  rpc Get(GetRequest) returns (GetResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
  rpc Status(StatusRequest) returns (StatusResponse);
}

message PutRequest {
  string key = 1;
  bytes value = 2;
}

message PutResponse {
  bool ok = 1;
  string leader = 2;
  string error = 3;
}

message GetRequest {
  string key = 1;
}

message GetResponse {
  bool found = 1;
  bytes value = 2;
  string leader = 3;
  string error = 4;
}

message DeleteRequest {
  string key = 1;
}

message DeleteResponse {
  bool ok = 1;
  string leader = 2;
  string error = 3;
}

message StatusRequest {}

message StatusResponse {
  string node_id = 1;
  string state = 2;
  string leader = 3;
  uint64 last_index = 4;
  uint64 applied_index = 5;
  repeated Peer peers = 6;
  string grpc_addr = 7;
  string raft_addr = 8;
  uint64 commit_index = 9;
}

message Peer {
  string id = 1;
  string raft_addr = 2;
  string grpc_addr = 3;
}
